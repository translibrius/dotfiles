[general]
live_config_reload = true

[terminal.shell]
program = "powershell.exe"
args = ["-NoLogo"]

[window]
opacity = 1.0
startup_mode = "Windowed"

[font]
size = 13
normal = { family = "Iosevka Nerd Font Mono", style = "Regular" }
bold = { family = "Iosevka Nerd Font Mono", style = "Bold" }
italic = { family = "Iosevka Nerd Font Mono", style = "Italic" }
bold_italic = { family = "Iosevka Nerd Font Mono", style = "Bold Italic" }

[colors]
cursor = { text = "CellBackground", cursor = "#ffff00" }

[colors.primary]
background = "#000000" # Pitch black

[cursor]
style = { shape = "Block", blinking = "Never" }

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[[keyboard.bindings]]
key = "C"
mods = "Control"
action = "Copy"

[[keyboard.bindings]]
key = "V"
mods = "Control"
action = "Paste"

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
chars = "\u0003"
